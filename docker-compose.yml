version: '3.8'
services:
  app:
    image: php:8.3-fpm
    container_name: presensi_app
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0
  db:
    image: mysql:8.0
    container_name: presensi_db
    environment:
      MYSQL_DATABASE: presensi
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3307:3306"
  